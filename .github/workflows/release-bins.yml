name: release-binaries

on:
  workflow_run:
    workflows: ["release-crate"]
    types: [completed]

jobs:
  get-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Get latest release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
  release-binary-assets:
    needs: get-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.get-release.outputs.tag }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: copyrite
          target: ${{ matrix.target }}
          ref: refs/tags/${{ needs.get-release.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release-linux-packages:
    needs: get-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.get-release.outputs.tag }}
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y rpm debhelper build-essential
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build RPM package
        run: rpmbuild --define "_topdir $(pwd)/rpmbuild" --build-in-place --nodeps -bb pkg/rpm/copyrite.spec
      - name: Release RPM assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-release.outputs.tag }}
          files: rpmbuild/RPMS/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Debian package
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        run: |
          cp -r pkg/debian .
          dpkg-buildpackage --build=binary --no-sign
      - name: Release Debian assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-release.outputs.tag }}
          files: ../*.deb
