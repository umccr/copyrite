name: docker

on:
  workflow_run:
    workflows: ["release-binaries"]
    types:
      - completed

#  push:
#    tags:
#      - '*'

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    name: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
#      - name: Set up QEMU
#        uses: docker/setup-qemu-action@v3
#        with:
#         platforms: "linux/amd64,linux/arm64"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          use: true
          install: true
          platforms: "linux/amd64,linux/arm64"
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
      - name: Login to GHCR.io (GH's Container Registry)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName')
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Docker GitHub release
        uses: docker/build-push-action@v7
        with:
          context: .
          file: pkg/docker/Dockerfile
          provenance: false
          platforms: "linux/amd64,linux/arm64"
          build-args: |
            GITHUB_REPO_RELEASES_URL=https://github.com/umccr/cloud-checksum/releases/download
            PACKAGE_VERSION=v${{ steps.tag.outputs.tag }}
          push: true
          tags: |
            ghcr.io/umccr/copyrite:${{steps.tag.outputs.tag}}


